name: Spec Issue
description: Report a problem with the spec — incorrect guidance, broken bootstrap step, outdated gotcha, etc.
labels: ["spec-issue"]
body:
  - type: dropdown
    id: section
    attributes:
      label: Affected spec section
      options:
        - spec/architecture.md
        - spec/frameworks.md
        - spec/infrastructure.md
        - spec/patterns.md
        - spec/development.md
        - spec/bootstrap.md
        - README.md
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      description: What does the spec say, and what should it say instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Did you hit this while bootstrapping a project? Reviewing existing code? Reading the spec?
    validations:
      required: false
