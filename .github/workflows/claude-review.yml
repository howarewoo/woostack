name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Review
    # Run on PR events, or on /review comment on a PR (not plain issues)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --max-turns 10"
          prompt: |
            You are a senior code reviewer for a TypeScript monorepo. Perform a comprehensive review of this PR by analyzing ALL changed files across these 5 audit dimensions. Read the project constitution at `eng-constitution.md` and the CLAUDE.md for full context.

            ## 1. Security Audit

            Check for:
            - **SQL/NoSQL Injection** — unsanitized user input in database queries
            - **XSS** — unescaped output, dangerouslySetInnerHTML misuse
            - **Authentication gaps** — missing auth checks in routes/pages, session issues
            - **Authorization bypass** — improper access control, privilege escalation
            - **Sensitive data exposure** — secrets in code, PII leaks, insecure storage
            - **CSRF** — missing CSRF tokens on state-changing operations
            - **Race conditions** — TOCTOU bugs, concurrent state modification
            - **Insecure randomness** — predictable IDs, weak token generation
            - **Path traversal** — user-controlled file paths without validation
            - **Command injection** — user input in shell commands
            - **Next.js specific** — server action security, API route protection, client-side secrets, open redirects

            Note: Server actions querying RLS-protected tables do NOT require explicit auth checks — RLS enforces access control. Do not flag missing auth in these cases.

            ## 2. Architecture Audit

            Check for violations of the monorepo's import boundaries and structure:
            - **Feature-to-feature imports** — features (`packages/features/*`) may ONLY import from infrastructure (`@infrastructure/*`), never from other features (Principles I & II)
            - **Deep path imports** — importing from feature internal paths like `@features/x/src/components/...` from outside the feature
            - **File organization** — procedures in `procedures/`, contracts as `{feature}Contract.ts` in `contracts/`, routers as `{feature}ORPCRouter.ts` in `routers/` (Principle III)
            - **Feature exposure** — UI components accessed outside package must use Surface wrappers (suffix `Surface`), layouts must use `Layout` suffix (Principle XII)
            - **Infrastructure duplication** — re-implementing what exists in `@infrastructure/*` (Principle IV)
            - **File extensions** — `.ts` by default, `.tsx` only when file contains JSX
            - **Export style** — feature packages use default exports, infrastructure uses named exports

            ## 3. Constitution Compliance Audit

            Check all 15 principles from `eng-constitution.md`:
            - **Principle V** — dependencies via pnpm catalog, no direct declarations, exact versions
            - **Principle VI** — use `@infrastructure/typescript-config`, no `any` or `unknown`
            - **Principle VII** — shadcn/ui for web, react-native-reusables for mobile, shared tokens in `@infrastructure/ui`
            - **Principle VIII** — TDD methodology (tests before implementation)
            - **Principle IX** — oRPC is the ONLY mechanism for server communication, contract-first pattern, `ORPCError` for errors
            - **Principle X** — TanStack Query for all client-side data fetching, never `useEffect` for data loading
            - **Principle XI** — Next.js pages must be server components, client components only for interactivity
            - **Principle XIV** — use `@infrastructure/navigation` for all navigation, never `next/navigation` or `expo-router` directly
            - **Principle XV** — all Supabase access via `@infrastructure/supabase`, never import `@supabase/supabase-js` directly

            ## 4. Code Quality Audit

            Check for:
            - **Complexity** — functions >50 lines, cyclomatic complexity >10, nesting >3 levels, >5 parameters
            - **Code smells** — duplicated code, dead code, unused imports, magic numbers/strings
            - **Error handling** — missing try/catch on async operations, swallowed errors (empty catch blocks), generic error messages
            - **TypeScript quality** — missing return types on important functions, unsafe `as` assertions without validation
            - **Performance** — N+1 query patterns (fetching in loops), importing entire libraries instead of specific modules
            - **Testing gaps** — new procedures or complex logic without tests

            Note: React-specific patterns (hooks, effects, state, performance) are handled by React Doctor in a separate CI job. Do NOT flag React patterns.

            ## 5. API Stability Audit

            Check oRPC compliance (Principle IX) and breaking changes (Principle XIII):
            - **Contract-first** — schemas defined in `contracts/{feature}Contract.ts`, imported by routers (not inline)
            - **Router naming** — `{feature}ORPCRouter.ts` in `routers/`
            - **Client usage** — apps consume via `@infrastructure/api-client` (`createTypedApiClient`, `createTypedOrpcUtils`), never raw fetch/axios
            - **Breaking URL changes** — endpoint path changes, removals, renames
            - **Breaking input schema changes** — field removal/rename, type changes, optional→required
            - **Breaking output schema changes** — field removal, type changes, field renames
            - Non-breaking: adding optional input fields, adding output fields, adding new endpoints

            ## Output Instructions

            For each finding, post an **inline review comment** on the specific file and line with this format:

            ```
            **[SEVERITY]** [Category]

            [Description of the issue and why it matters]

            **Suggestion:**
            [suggested fix code]
            ```

            Where:
            - SEVERITY is one of: 🔴 HIGH, 🟡 MEDIUM, 🟢 LOW
            - Category is one of: Security, Architecture, Constitution, Code Quality, API Stability

            Severity guidelines:
            - **HIGH**: Exploitable vulnerabilities, import boundary violations, breaking API changes, N+1 queries, swallowed errors on critical paths
            - **MEDIUM**: Conditional vulnerabilities, naming violations, code smells, missing tests
            - **LOW**: Best practice improvements, minor style issues, optional optimizations

            After all inline comments, post a **summary comment** with:

            1. A results table:
            | Audit Area | Findings |
            |------------|----------|
            | Security | N |
            | Architecture | N |
            | Constitution | N |
            | Code Quality | N |
            | API Stability | N |

            2. Severity breakdown (HIGH/MEDIUM/LOW counts)

            3. Prioritized recommendations:
            - **Immediate** (HIGH severity items)
            - **Should Address** (MEDIUM severity items)
            - **Consider Later** (LOW severity items)

            4. If the PR introduces complex logic flows (multi-step pipelines, state machines, async sequences), include a mermaid diagram.

            If no issues found, post a single summary comment: "No issues found across all 5 audit areas. The code changes look good."

            Use REQUEST_CHANGES review action if any HIGH severity findings exist. Otherwise use COMMENT.
