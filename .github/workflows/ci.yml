name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, staging]

jobs:
  tests:
    name: Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: ${{ github.head_ref == 'main' && 'Production' || 'Staging' }}
    concurrency:
      group: ci-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check generated files are up to date
        run: |
          pnpm gencode
          git diff --exit-code -- packages/infrastructure/api-client/src/generated/

      - name: Run Biome CI
        run: pnpx biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm turbo build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Fetch base ref for test filtering
        id: fetch-base
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="${{ github.base_ref }}"
          if git fetch origin "$BASE_REF" 2>/dev/null; then
            echo "filter=--filter='...[origin/$BASE_REF]'" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Base ref '$BASE_REF' not found, running all tests"
            echo "filter=" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: pnpm turbo run test ${{ steps.fetch-base.outputs.filter }} --output-logs=errors-only

  react-doctor:
    name: React Doctor
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: react-doctor-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch base branch for diff
        id: fetch-base
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if git fetch origin "$BASE_REF":"$BASE_REF" 2>/dev/null; then
            echo "ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Base ref '$BASE_REF' not found, falling back to staging"
            git fetch origin staging:staging
            echo "ref=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Run React Doctor
        run: npx -y react-doctor@0.0.30 . --project landing,web --diff ${{ steps.fetch-base.outputs.ref }} --verbose --fail-on error

  e2e:
    name: E2E Tests
    if: github.event_name == 'pull_request'
    needs: tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
