name: CI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  tests:
    name: Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: ${{ github.head_ref == 'main' && 'Production' || github.head_ref == 'staging' && 'Staging' || 'Preview' }}
    concurrency:
      group: ci-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Debug context
        run: |
          echo "base_ref: ${{ github.base_ref }}"
          echo "head_ref: ${{ github.head_ref }}"
          echo "event_name: ${{ github.event_name }}"
          echo "environment: ${{ github.head_ref == 'main' && 'Production' || github.head_ref == 'staging' && 'Staging' || 'Preview' }}"

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run Biome CI
        run: pnpx biome ci .

      - name: Build
        run: pnpm turbo build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Test
        run: pnpm test:changed

  react-doctor:
    name: React Doctor
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: react-doctor-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}

      - uses: millionco/react-doctor@main
        with:
          diff: ${{ github.event.pull_request.base.ref }}
          verbose: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: "error"
